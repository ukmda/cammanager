[bumpver]
current_version = "2025.11.1"
version_pattern = "YYYY.0M.PATCH"
commit_message = "bump version {old_version} -> {new_version}"
commit = true
tag = true
push = true

[bumpver.file_patterns]
"README.md" = [
    "version: {version}"
]
"bumpver.toml" = [
    'current_version = "{version}"',
]
"stationMaint2.py" = [
    "version = '{version}'"
]
